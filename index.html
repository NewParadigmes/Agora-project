<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Scotia Home Services Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --pine: #1a3a2a;
            --pine-light: #2d5c3f;
            --ocean: #0d3b5e;
            --ocean-light: #1a5a8a;
            --sand: #f5f0e8;
            --sand-dark: #e8dfc9;
            --text: #1c1c1c;
            --text-muted: #6b6b6b;
            --white: #ffffff;
            --accent-inspector: #c07a3a;
            --accent-elec: #2a6db5;
            --accent-plumb: #1a7a5a;
            --radius: 10px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--sand);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--pine);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--sand);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Fraunces', serif;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .hero {
            background: linear-gradient(135deg, var(--pine) 0%, var(--ocean) 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            color: var(--white);
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 8px 18px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-pill.active {
            background: var(--white);
            color: var(--pine);
            font-weight: 600;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex: 1;
        }

        #map {
            height: 100%;
            min-height: 500px;
            z-index: 1;
        }

        .sidebar {
            background: var(--white);
            border-left: 1px solid var(--sand-dark);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--sand-dark);
            background: var(--sand);
        }

        .region-badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--pine);
            color: white;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .sidebar-list {
            overflow-y: auto;
            flex: 1;
            padding: 1rem;
        }

        .company-card {
            border: 1px solid var(--sand-dark);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 12px;
            position: relative;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .card-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .card-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .star-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            border-top: 1px solid var(--sand);
            padding-top: 8px;
        }

        .card-phone {
            font-size: 0.85rem;
            color: var(--pine-light);
            font-weight: 500;
            text-decoration: none;
        }

        footer {
            background: var(--pine);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            #map {
                height: 350px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-icon">🏠</div>
            <div class="logo-text">NS Home Services</div>
        </div>
    </header>

    <div class="hero">
        <h1>Find trusted trades in Nova Scotia</h1>
        <div class="filter-bar">
            <button class="filter-pill active" onclick="setFilter('all', this)">All Services</button>
            <button class="filter-pill" onclick="setFilter('inspector', this)">Inspectors</button>
            <button class="filter-pill" onclick="setFilter('electrician', this)">Electricians</button>
        </div>
    </div>

    <div class="main-layout">
        <div id="map"></div>
        <div class="sidebar">
            <div class="sidebar-header">
                <h2 id="sidebar-title">Select a Region</h2>
                <div id="region-badge" style="display:none" class="region-badge"></div>
            </div>
            <div class="sidebar-list" id="sidebar-list">
                <p style="text-align:center; padding: 2rem; color: #888;">Click a region on the map to see local
                    professionals.</p>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Nova Scotia Home Services</footer>

    <script>
        // --- DATA ---
        const PROVIDERS = [
            { id: "p1", region: "HRM", name: "Halifax Property Check", type: "inspector", phone: "(902) 555-0101", rating: 4.8 },
            { id: "p2", region: "HRM", name: "Salty Sea Electric", type: "electrician", phone: "(902) 555-0202", rating: 4.9 },
            { id: "p3", region: "Annapolis", name: "Valley View Inspections", type: "inspector", phone: "(902) 555-0107", rating: 4.7 },
            { id: "p4", region: "Pictou", name: "Highland Home Check", type: "inspector", phone: "(902) 555-0116", rating: 4.5 }
        ];

        const DTT_RATES = { "HRM": 1.5, "Annapolis": 1.25, "Pictou": 1.0 };

        const REGIONS = [
            { id: "HRM", name: "Halifax (HRM)", coords: [[45.3, -63.8], [44.95, -64.0], [44.7, -63.5], [44.8, -63.0], [45.1, -62.8]], color: "#1a3a2a" },
            { id: "Annapolis", name: "Annapolis Valley", coords: [[45.15, -64.7], [44.7, -65.2], [44.55, -65.8], [44.8, -66.1], [45.1, -65.8]], color: "#2d5c3f" },
            { id: "Pictou", name: "Pictou County", coords: [[45.7, -63.0], [45.5, -62.5], [45.4, -62.0], [45.6, -61.6], [45.8, -62.0]], color: "#c03a5a" }
        ];

        let activeRegion = null;
        let activeFilter = 'all';
        let shortlist = JSON.parse(localStorage.getItem('ns_shortlist') || '[]');

        // --- MAP INIT ---
        const map = L.map('map').setView([45.0, -63.5], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        REGIONS.forEach(region => {
            const poly = L.polygon(region.coords, { color: region.color, weight: 2, fillOpacity: 0.15 }).addTo(map);

            poly.on('click', function () {
                activeRegion = region.id;
                renderSidebar(region.id, region.name);
                map.fitBounds(poly.getBounds());
            });
        });

        // --- LOGIC ---
        function setFilter(type, btn) {
            activeFilter = type;
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            if (activeRegion) {
                const r = REGIONS.find(reg => reg.id === activeRegion);
                renderSidebar(activeRegion, r.name);
            }
        }

        function toggleShortlist(id) {
            if (shortlist.includes(id)) {
                shortlist = shortlist.filter(i => i !== id);
            } else {
                shortlist.push(id);
            }
            localStorage.setItem('ns_shortlist', JSON.stringify(shortlist));
            const r = REGIONS.find(reg => reg.id === activeRegion);
            renderSidebar(activeRegion, r.name);
        }

        function renderSidebar(id, name) {
            const list = document.getElementById('sidebar-list');
            const title = document.getElementById('sidebar-title');
            const badge = document.getElementById('region-badge');

            title.textContent = name;
            badge.style.display = 'inline-block';
            badge.textContent = `Deed Transfer Tax: ${DTT_RATES[id] || 1.5}%`;

            let filtered = PROVIDERS.filter(p => p.region === id);
            if (activeFilter !== 'all') filtered = filtered.filter(p => p.type === activeFilter);

            if (filtered.length === 0) {
                list.innerHTML = `<p style="padding:2rem; color:#888;">No ${activeFilter}s found in this region yet.</p>`;
                return;
            }

            list.innerHTML = filtered.map(p => `
    <div class="company-card">
      <div class="card-top">
        <div>
          <div class="card-name">${p.name}</div>
          <div class="card-type">${p.type}</div>
        </div>
        <button class="star-btn" onclick="toggleShortlist('${p.id}')">
          ${shortlist.includes(p.id) ? '⭐' : '☆'}
        </button>
      </div>
      <div class="card-footer">
        <a class="card-phone" href="tel:${p.phone}">${p.phone}</a>
        <div style="font-size:0.8rem">★ ${p.rating}</div>
      </div>
    </div>
  `).join('');
        }
    </script>
</body>

</html>
